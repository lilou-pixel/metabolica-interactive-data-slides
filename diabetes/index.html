const MIN_DISPLAY_R = 0.5;

// Per-country radius scales: r = scale * sqrt(real_area_km2)
const ISLAND_SCALE = {
  'Marshall Islands': 2.0,
  'Samoa':            0.28,
  'Kiribati':         0.8,
  'French Polynesia': 0.22,
};

function islandR(countryName, realArea) {
  const scale = ISLAND_SCALE[countryName] || 1;
  return Math.max(MIN_DISPLAY_R, scale * Math.sqrt(realArea));
}

function segmentAreaBelow(cy, r, W) {
  if (W <= cy - r) return Math.PI * r * r;
  if (W >= cy + r) return 0;
  const h = (cy + r) - W;
  return r * r * Math.acos((r - h) / r) - (r - h) * Math.sqrt(2 * r * h - h * h);
}

function findWaterline(islands, pct) {
  const totalArea = islands.reduce((s, i) => s + Math.PI * i.r * i.r, 0);
  const target = (pct / 100) * totalArea;
  const yMin = Math.min(...islands.map(i => i.y - i.r));
  const yMax = Math.max(...islands.map(i => i.y + i.r));
  let lo = yMin, hi = yMax;
  for (let k = 0; k < 100; k++) {
    const mid = (lo + hi) / 2;
    const area = islands.reduce((s, i) => s + segmentAreaBelow(i.y, i.r, mid), 0);
    if (area > target) lo = mid;
    else hi = mid;
  }
  return (lo + hi) / 2;
}

let cur = 0, busy = false;
const track  = document.getElementById('track');
const pbar   = document.getElementById('pbar');

const arrR   = document.getElementById('arr-r');
const widget = document.getElementById('widget');

function buildIslandSVG(countryName, slideIndex) {
  const data = ISLAND_COUNTRIES[countryName];
  if (!data) return '';
  // Compute r for each island based on real area
  const islands = data.islands.map(isl => ({ ...isl, r: islandR(countryName, isl.real) }));
  // Find waterline that fills exactly pct% of total SVG circle area
  const W = findWaterline(islands, data.pct);

  let defs = `<defs>`;
  let green = '', red = '';
  for (const isl of islands) {
    const clipId = `wl-${slideIndex}-${isl.id}`;
    const bottom = isl.y + isl.r;
    const clipY = Math.max(W, isl.y - isl.r);
    const clipH = bottom - clipY;
    // Green base
    green += `<circle cx="${isl.x}" cy="${isl.y}" r="${isl.r}" fill="#C8F5C8" stroke="rgba(0,0,0,0.18)" stroke-width="0.9"/>`;
    if (clipH > 0) {
      // Red fill clipped to the portion below waterline
      defs += `<clipPath id="${clipId}"><rect id="clip-${slideIndex}-${isl.id}" x="${(isl.x-isl.r-0.5).toFixed(2)}" y="${bottom.toFixed(3)}" width="${(isl.r*2+1).toFixed(2)}" height="0" data-clipy="${clipY.toFixed(3)}" data-cliph="${clipH.toFixed(3)}" data-bottom="${bottom.toFixed(3)}"/></clipPath>`;
      red += `<circle cx="${isl.x}" cy="${isl.y}" r="${isl.r}" fill="#D42B2B" stroke="rgba(0,0,0,0.18)" stroke-width="0.9" clip-path="url(#${clipId})"/>`;
    }
  }
  defs += `</defs>`;
  return defs + green + red;
}

for (let i = 0; i < TOTAL; i++) {

  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', `Slide ${i + 1}`);
  d.addEventListener('click', (n => () => go(n))(i));
  dotsEl.appendChild(d);
  dotEls.push(d);
}

function ui() {
  const w = widget.offsetWidth;
  track.style.transform = `translateX(-${cur * w}px)`;
  pbar.style.width = `${(cur / (TOTAL - 1)) * 100}%`;
  dotEls.forEach((d, i) => d.classList.toggle('active', i === cur));
  arrL.classList.toggle('hidden', cur === 0);
  arrR.classList.toggle('hidden', cur === TOTAL - 1);
}

function go(n) {
  if (n < 0 || n >= TOTAL || busy) return;
  busy = true; cur = n; ui();
  setTimeout(() => { busy = false; if (cur >= 1) animateCountry(cur); }, 820);
}

function animateCountry(si) {
  const c = COUNTRIES[si - 1];
  const bar   = document.getElementById(`bar-${si}`);
  const pctEl = document.getElementById(`pct-${si}`);
  if (!bar || !pctEl) return;
  const DURATION = 2200, DELAY = 200;
  function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  if (c.islands) {
    const data = ISLAND_COUNTRIES[c.name];
    const islands = data.islands.map(isl => ({ ...isl, r: islandR(c.name, isl.real) }));
    const finalW = findWaterline(islands, data.pct);
    // Waterline animates from below all circles (yMax) up to finalW
    const yMax = Math.max(...islands.map(i => i.y + i.r)) + 1;
    // Reset all clip rects to fully-below (height=0, y=bottom)
    const clipRects = [];
    for (const isl of islands) {
      const rect = document.getElementById(`clip-${si}-${isl.id}`);
      if (rect) {
        const bottom = parseFloat(rect.getAttribute('data-bottom'));
        rect.setAttribute('y', String(bottom));
        rect.setAttribute('height', '0');
        clipRects.push({ isl, rect, bottom });
      }
    }
    bar.style.width = '0%'; pctEl.textContent = '0%';
    let startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      const raw = Math.min((ts - startTime) / DURATION, 1);
      const e = ease(raw);
      // Interpolate waterline from yMax down to finalW
      const W = yMax + e * (finalW - yMax);
      // Update each clip rect based on current waterline
      for (const { isl, rect, bottom } of clipRects) {
        const clipY = Math.max(W, isl.y - isl.r);
        const clipH = Math.max(0, bottom - clipY);
        rect.setAttribute('y', clipY.toFixed(3));
        rect.setAttribute('height', clipH.toFixed(3));
      }
      bar.style.width = (c.pct * e) + '%';
      pctEl.textContent = raw < 1 ? (c.pct * e).toFixed(1) + '%' : c.pct + '%';
      if (raw < 1) requestAnimationFrame(step);
    }
    setTimeout(() => requestAnimationFrame(step), DELAY);
  } else {
    const fill = document.getElementById(`fill-${si}`);
    if (!fill) return;
    const shapeH = c.ymax - c.ymin;
    const targetH = (c.pct / 100) * shapeH;
    fill.setAttribute('y','100'); fill.setAttribute('height','0');
    bar.style.width = '0%'; pctEl.textContent = '0%';
    let startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      const raw = Math.min((ts - startTime) / DURATION, 1);
      const e = ease(raw);
      fill.setAttribute('y', String(c.ymax - targetH * e));
      fill.setAttribute('height', String(targetH * e));
      bar.style.width = (c.pct * e) + '%';
      pctEl.textContent = raw < 1 ? (c.pct * e).toFixed(1) + '%' : c.pct + '%';
      if (raw < 1) requestAnimationFrame(step);
    }
    setTimeout(() => requestAnimationFrame(step), DELAY);
  }
}

window.addEventListener('resize', () => {
  track.style.transition = 'none'; ui();
  requestAnimationFrame(() => { track.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)'; });
});
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
widget.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchStartTime = Date.now(); }, { passive:true });
widget.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = Math.abs(touchStartY - e.changedTouches[0].clientY);
  if (Math.abs(dx) > 30 && Math.abs(dx) > dy && Math.abs(dx)/(Date.now()-touchStartTime) > 0.2) go(dx > 0 ? cur+1 : cur-1);
}, { passive:true });
let acc = 0;
widget.addEventListener('wheel', e => {
  e.preventDefault(); if (busy) return;
  acc += e.deltaY;
  if (Math.abs(acc) >= 80) { go(acc > 0 ? cur+1 : cur-1); acc = 0; }
}, { passive:false });
window.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(cur+1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(cur-1);
});
arrL.addEventListener('click', () => go(cur-1));
arrR.addEventListener('click', () => go(cur+1));
ui();
</script>
</body>
