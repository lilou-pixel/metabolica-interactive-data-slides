<style>
  :root {
    --red: #D42B2B; --dark: #1a1a1a; --grey: #6b7280;
    --bg: #D9D9D9;
    --font: 'Gill Sans', 'GillSans', 'Gill Sans MT', Calibri, sans-serif;
  }
  .plate-wrap { display:flex; flex-direction:column; align-items:center; padding:2rem 0 1.5rem; background:var(--bg); gap:1.1rem; font-family:var(--font); }
  .headline { font-size:20px; font-weight:600; color:var(--red); text-align:center; max-width:380px; }
  .plate-container { position:relative; width:320px; height:320px; }
  .hint { font-size:13px; color:var(--grey); font-weight:500; }
  .tooltip { position:absolute; background:#fff; color:var(--dark); border-radius:5px; padding:9px 13px; font-family:var(--font); font-size:13px; font-weight:500; pointer-events:none; opacity:0; transition:opacity 0.18s; min-width:155px; max-width:185px; z-index:10; border-left:3px solid transparent; }
  .tooltip.visible { opacity:1; }
</style>

<div class="plate-wrap">
  <p class="headline">Dr V Mohan's recommended meal formula</p>
  <div class="plate-container" id="plate">
    <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;">
      <defs><clipPath id="cc"><circle cx="160" cy="160" r="148"/></clipPath></defs>
      <image href="plate.png" x="11" y="11" width="298" height="298" preserveAspectRatio="xMidYMid slice" clip-path="url(#cc)"/>
      <path id="hit1" d="M160,160 L12,160 A148,148 0 0,1 308,160 Z" fill="#2a7d5f" fill-opacity="0" style="cursor:pointer;" clip-path="url(#cc)"/>
      <path id="hit2" d="M160,160 L12,160 A148,148 0 0,0 160,308 Z" fill="#D42B2B" fill-opacity="0" style="cursor:pointer;" clip-path="url(#cc)"/>
      <path id="hit3" d="M160,160 L160,308 A148,148 0 0,0 308,160 Z" fill="#c47b2a" fill-opacity="0" style="cursor:pointer;" clip-path="url(#cc)"/>
      <circle cx="160" cy="160" r="148" fill="none" stroke="#e8dcc8" stroke-width="8"/>
    </svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <p class="hint">Hover over each section of the plate</p>
</div>

<script>
const sections = {
  hit1: { text: "Green leafy, non-starchy vegetables", color: "#2a7d5f", tipX: "left",  tipY: "top"    },
  hit2: { text: "Plant protein",                       color: "#D42B2B", tipX: "left",  tipY: "bottom" },
  hit3: { text: "Complex carbohydrates",               color: "#c47b2a", tipX: "right", tipY: "bottom" }
};
const tooltip = document.getElementById('tooltip');
Object.keys(sections).forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('mouseenter', () => {
    const s = sections[id];
    el.setAttribute('fill-opacity', '0.22');
    tooltip.textContent = s.text;
    tooltip.style.borderLeftColor = s.color;
    tooltip.style.width = '185px';
    tooltip.style.left = (s.tipX === 'left' ? 6 : 129) + 'px';
    tooltip.style.top  = (s.tipY === 'top'  ? 16 : 252) + 'px';
    tooltip.classList.add('visible');
  });
  el.addEventListener('mouseleave', () => {
    el.setAttribute('fill-opacity', '0');
    tooltip.classList.remove('visible');
  });
});
</script>
